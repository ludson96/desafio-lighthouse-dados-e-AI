services:
  source_db:
    image: postgres:12
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/raw/vendas_2023_2024.csv:/tmp/vendas_2023_2024.csv
      - ./data/raw/produtos_raw.csv:/tmp/produtos_raw.csv
    ports:
      - 5433:5432

  target_db:
    image: postgres:12
    environment:
      POSTGRES_DB: target_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5434:5432
